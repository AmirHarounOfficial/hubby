name: CI/CD

# Pull requests → run checks only.
# Push to main → run checks, then deploy to the server over SSH.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Never let two deploys run at once; cancel an in-progress run if a newer push lands.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests (non-blocking)
        working-directory: frontend
        run: npm run test
        continue-on-error: true

      - name: Production build
        working-directory: frontend
        run: npm run build

  backend:
    name: Backend (tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql, pdo_sqlite, redis, gd, zip, bcmath, exif, pcntl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan config:clear

      - name: PHPUnit (sqlite in-memory)
        working-directory: backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

  deploy:
    name: Deploy to server
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    # Only deploy real pushes to main — never on pull requests.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            ./deploy.sh
