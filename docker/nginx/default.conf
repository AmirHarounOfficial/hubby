server {
    listen 80;
    client_max_body_size 100M;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    # API and Laravel Backend
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve Laravel storage files
    location /storage {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Resolve the PHP-FPM upstream at request time (via Docker's embedded DNS)
        # so nginx still boots if `app` is briefly down — e.g. start ordering or a
        # redeploy — instead of hard-failing with "host not found in upstream".
        resolver 127.0.0.11 valid=30s;
        set $backend_upstream app:9000;
        fastcgi_pass $backend_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        # Windows Docker bind-mounts make cold PHP requests slow; don't 504 them.
        fastcgi_connect_timeout 300s;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
    }

    # Next.js Frontend
    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
