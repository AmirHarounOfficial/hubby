; OPcache tuning for local dev on Docker Desktop (Windows bind-mounts).
; Caching compiled bytecode avoids re-reading/recompiling vendor files from the
; slow bind-mount on every request — the main cause of 60s+ responses / 504s.
; (OPcache is already loaded by the base image; we only tune it here.)
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=30000
; Don't stat every file on every request (the slow part on bind-mounts).
; NOTE: backend code changes then require: docker compose restart app
opcache.validate_timestamps=0
opcache.revalidate_freq=0
realpath_cache_size=8M
realpath_cache_ttl=600
