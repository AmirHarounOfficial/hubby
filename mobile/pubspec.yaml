name: hubby_global
description: "Hubby — multi-store commerce control, in your pocket."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.9.2

  # Routing
  go_router: ^17.2.3

  # Storage
  shared_preferences: ^2.5.5

  # UI / charts / icons / fonts
  fl_chart: ^1.2.0
  lucide_icons: ^0.257.0
  google_fonts: ^8.1.0
  intl: ^0.20.2
  flutter_svg: ^2.0.10

  # Files / sharing / media
  image_picker: ^1.1.2
  share_plus: ^11.0.0
  path_provider: ^2.1.5

  # Push (kept from the original scaffold)
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/saudi_riyal.svg
